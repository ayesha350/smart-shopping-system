<div style="background: white; padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: 0 auto;">
    
    <form action="{% url 'search' %}" method="GET" style="display: flex; width: 100%; align-items: center;">
        <input type="text" name="q" value="{{ query|default:'' }}" placeholder="Search products..." 
               style="flex: 1; border: none; outline: none; padding: 10px; font-size: 16px;">
        
        <button type="button" onclick="alert('Voice search coming soon!')" title="Voice Search"
                style="background: none; border: none; cursor: pointer; padding: 0 10px; font-size: 20px; color: #777;">
            🎤
        </button>

        <button type="button" onclick="alert('Image search coming soon!')" title="Image Search"
                style="background: none; border: none; cursor: pointer; padding: 0 10px; font-size: 20px; color: #777;">
            📷
        </button>

        <button type="submit" style="background: #ff4757; color: white; border: none; border-radius: 50px; padding: 10px 25px; margin-left: 10px; cursor: pointer; font-weight: bold;">
            Search
        </button>
    </form>
</div>
