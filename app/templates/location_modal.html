{% if not location %}
<div id="locationModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h2 style="margin-top: 0; color: #2f3542;">Set Your Location</h2>
        <p style="color: #777; font-size: 14px;">We need your location to show products available near you.</p>
        
        <form action="{% url 'set_location' %}" method="POST">
            {% csrf_token %}
            <input type="text" name="location" placeholder="Enter City (e.g. Mumbai)" required 
                   style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            
            <button type="submit" style="width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Confirm Location
            </button>
        </form>
    </div>
</div>
{% endif %}
